# ============================================
#   PetConnect - Application Configuration
# ============================================

# Server
server.port=8080

# Application Name
spring.application.name=PetConnect

# ── DATABASE (MySQL) ──────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/petconnect?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / HIBERNATE ───────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── THYMELEAF ────────────────────────────────
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ── FILE UPLOAD ──────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads/pets/

# ── LOGGING ──────────────────────────────────
logging.level.com.petconnect=DEBUG
logging.level.org.springframework.security=INFO

# ── CUSTOM APP PROPERTIES ────────────────────
app.name=PetConnect
app.version=1.0.0
app.admin.email=admin@petconnect.com
