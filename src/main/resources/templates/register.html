<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Register')}"></head>
<body class="pc-body auth-bg">
<div class="auth-wrap">
  <a href="/" class="auth-logo">🐾 PetConnect</a>
  <div class="auth-card">
    <h2 class="auth-title">Join PetConnect</h2>
    <p class="auth-sub">Create your free account and find your perfect pet!</p>
    <div th:if="${error}" class="alert-error" th:text="${error}"></div>
    <form action="/register" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <div class="auth-field"><label>Full Name</label><input type="text" name="name" placeholder="Arjun Sharma" required/></div>
      <div class="auth-field"><label>Email Address</label><input type="email" name="email" placeholder="you@example.com" required/></div>
      <div class="auth-field"><label>Phone</label><input type="text" name="phone" placeholder="9876543210"/></div>
      <div class="auth-field"><label>Password</label><input type="password" name="password" placeholder="Choose a strong password" required/></div>
      <button type="submit" class="auth-btn">Create My Account 🐾</button>
    </form>
    <div class="auth-footer">Already have an account? <a href="/login">Login here</a></div>
  </div>
</div>
</body></html>
