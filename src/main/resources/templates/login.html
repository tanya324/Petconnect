<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Login')}"></head>
<body class="pc-body auth-bg">
<div class="auth-wrap">
  <a href="/" class="auth-logo">🐾 PetConnect</a>
  <div class="auth-card">
    <h2 class="auth-title">Welcome Back!</h2>
    <p class="auth-sub">Login to manage your pets and adoptions</p>
    <div th:if="${param.error}" class="alert-error">❌ Invalid email or password. Please try again.</div>
    <div th:if="${param.registered}" class="alert-success">✅ Registration successful! Please login.</div>
    <div th:if="${param.logout}" class="alert-info">👋 You've been logged out successfully.</div>
    <form action="/login" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <div class="auth-field"><label>Email Address</label><input type="email" name="username" placeholder="you@example.com" required/></div>
      <div class="auth-field"><label>Password</label><input type="password" name="password" placeholder="Your password" required/></div>
      <button type="submit" class="auth-btn">Login to PetConnect</button>
    </form>
    <div class="auth-footer">Don't have an account? <a href="/register">Sign up free</a></div>
    <div class="auth-demo-hint">Demo: admin@petconnect.com / admin123</div>
  </div>
</div>
</body></html>
